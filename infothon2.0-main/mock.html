<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>EcoRoute — Mock Admin</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  
  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet"/>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

  <style>
    :root {
      --orange: #FF6B00;
      --green: #22C55E;
      --red: #EF4444;
      --bg: #0A0A0A;
      --surface: #171717;
      --text: #F5F5F5;
      --text-muted: #A3A3A3;
      --border: #262626;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    aside {
      width: 420px;
      height: 100%;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px;
      overflow-y: auto;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      color: var(--orange);
      margin-bottom: 24px;
    }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; }
    input, select {
      width: 100%;
      background: #222;
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 8px;
      color: white;
      font-size: 0.9rem;
    }
    input:focus { border-color: var(--orange); outline: none; }

    .btn {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }
    .btn-primary { background: var(--orange); color: white; }
    .btn-primary:hover { transform: scale(1.02); filter: brightness(1.1); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: white; margin-top: 8px; }
    .btn-outline:hover { background: #222; }

    .mock-list { margin-top: 32px; border-top: 1px solid var(--border); padding-top: 24px; }
    .mock-card {
      background: #222;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      cursor: pointer;
      position: relative;
    }
    .mock-card.active { border-color: var(--orange); }
    .mock-card h3 { font-size: 0.95rem; margin-bottom: 4px; }
    .mock-card p { font-size: 0.75rem; color: var(--text-muted); }
    .mock-card .badge {
      position: absolute; top: 14px; right: 14px;
      font-size: 0.65rem; padding: 2px 6px; border-radius: 4px;
      background: var(--border);
    }
    .mock-card .actions { display: flex; gap: 8px; margin-top: 10px; }
    .mock-card .btn-small { padding: 4px 8px; font-size: 0.7rem; border-radius: 4px; }

    /* Map */
    main { flex: 1; height: 100%; position: relative; }
    #map { width: 100%; height: 100%; }

    .map-hint {
      position: absolute; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      padding: 8px 16px; border-radius: 100px;
      font-size: 0.8rem; z-index: 10;
      border: 1px solid rgba(255,107,0,0.3);
    }

    .toast {
      position: fixed; top: 24px; right: 24px;
      background: var(--surface); color: white; padding: 12px 24px;
      border-radius: 8px; border-left: 4px solid var(--green);
      transform: translateY(-100px); opacity: 0; transition: all 0.3s;
      z-index: 9999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <aside>
    <h1>EcoRoute Admin</h1>

    <div id="editor-title" style="font-weight:700; margin-bottom:12px; font-size:1.1rem;">Add New Mock User</div>
    
    <div class="form-group">
      <label>Name / Checkpoint Label</label>
      <input type="text" id="mock-name" placeholder="e.g. Rahul Sharma or Saraswathipuram Bin"/>
    </div>

    <div class="form-group">
      <label>Role</label>
      <select id="mock-role">
        <option value="home">🏠 Home User</option>
        <option value="point">🗑️ Community Point (Checkpoint)</option>
      </select>
    </div>

    <div class="form-group">
      <label>Fill Level (%)</label>
      <input type="number" id="mock-fill" value="85" min="0" max="100"/>
    </div>

    <div style="display:flex; gap:12px;">
      <div class="form-group" style="flex:1;">
        <label>Latitude</label>
        <input type="text" id="mock-lat" readonly/>
      </div>
      <div class="form-group" style="flex:1;">
        <label>Longitude</label>
        <input type="text" id="mock-lng" readonly/>
      </div>
    </div>

    <button id="save-btn" class="btn btn-primary">Save Mock User</button>
    <button id="cancel-btn" class="btn btn-outline" style="display:none;">Cancel Edit</button>

    <div style="margin-top: 24px; border-top: 1px solid var(--border); padding-top: 16px;">
      <div style="font-weight:700; margin-bottom:8px; font-size:1rem; color:var(--orange);">Test Features</div>
      <button id="test-notif-btn" class="btn btn-outline" style="width:100%; border-color: var(--orange); color: var(--orange);">🔔 Trigger Push Notification</button>
    </div>

    <div class="mock-list">
      <div style="font-weight:600; font-size:0.85rem; margin-bottom:12px; color:var(--text-muted)">CURRENT MOCK USERS</div>
      <div id="list-container">
        <!-- List injected here -->
      </div>
    </div>
  </aside>

  <main>
    <div id="map"></div>
    <div class="map-hint">Click anywhere on the map to set location 📍</div>
  </main>

  <div id="toast" class="toast">Successfully saved!</div>

  <!-- Dependencies (Cache-busted to ensure same-day updates) -->
  <script src="/config.js?t=1775889104"></script>
  <script src="/api.js?t=1775889104"></script>

  <script>
    let map;
    let tempMarker = null;
    let mocks = [];
    let editingId = null;

    async function init() {
      console.log('🚀 Initializing Mock Admin Dashboard...');
      
      // 1. Fetch Config
      try {
        const cfg = await ApiModule.getConfig();
        console.log('📦 Config fetched:', cfg);
        if (cfg.MAPBOX_TOKEN) {
          ECOROUTE_CONFIG.MAPBOX_TOKEN = cfg.MAPBOX_TOKEN;
        }
      } catch(e) {
        console.warn('⚠️ Could not fetch config from server, using local defaults.', e);
      }

      // 2. Load Map
      try {
        if (!ECOROUTE_CONFIG.MAPBOX_TOKEN || ECOROUTE_CONFIG.MAPBOX_TOKEN.includes('YOUR_')) {
          console.error('❌ Mapbox token is missing or invalid!');
          showToast('Mapbox token is missing!', 'red');
        }
        
        mapboxgl.accessToken = ECOROUTE_CONFIG.MAPBOX_TOKEN;
        map = new mapboxgl.Map({
          container: 'map',
          style: 'mapbox://styles/mapbox/dark-v11',
          center: ECOROUTE_CONFIG.DEFAULT_CENTER,
          zoom: 14
        });

        map.on('load', () => console.log('🗺️ Map loaded successfully'));
        
        map.on('click', (e) => {
          const { lng, lat } = e.lngLat;
          updateFormCoords(lat, lng);
          setTempMarker(lat, lng);
        });
      } catch(e) {
        console.error('❌ Map error:', e);
      }

      // 3. Load Mocks
      loadMocks();
    }

    async function loadMocks() {
      console.log('📡 Fetching mocks from server...');
      
      // Defensive check for stale API script
      if (typeof ApiModule.getAdminMocks !== 'function') {
        console.error('❌ STALE API: ApiModule.getAdminMocks is missing! This is likely a cache issue.');
        showToast('Stale browser cache detected!', 'red');
        document.getElementById('list-container').innerHTML = `
          <div style="color:#EF4444; padding:20px; text-align:center;">
            <strong>⚠️ Stale Browser Cache detected.</strong><br>
            The function <code>getAdminMocks</code> is missing. 
            Please perform a <strong>Hard Refresh</strong> (Ctrl+F5) to load the latest logic.
          </div>
        `;
        return;
      }

      try {
        const res = await ApiModule.getAdminMocks();
        console.log('✅ Mocks received:', res);
        mocks = res || [];
        
        if (mocks.length === 0) {
          console.warn('⚠️ No mocks found in the database.');
          document.getElementById('list-container').innerHTML = '<div style="color:#A3A3A3; padding:20px; text-align:center;">No mock users found in database. Check the server seeding logic.</div>';
        } else {
          renderList();
          renderMarkers();
        }
      } catch(e) {
        console.error('❌ Error fetching mocks:', e);
        showToast('Error loading mocks from server', 'red');
        document.getElementById('list-container').innerHTML = `<div style="color:#EF4444; padding:20px; text-align:center;">Failed to connect to server: ${e.message}</div>`;
      }
    }

    function updateFormCoords(lat, lng) {
      document.getElementById('mock-lat').value = lat.toFixed(6);
      document.getElementById('mock-lng').value = lng.toFixed(6);
    }

    function setTempMarker(lat, lng) {
      if (tempMarker) tempMarker.remove();
      const el = document.createElement('div');
      el.innerHTML = '📍';
      el.style.fontSize = '24px';
      tempMarker = new mapboxgl.Marker({ element: el })
        .setLngLat([lng, lat])
        .addTo(map);
    }

    function renderList() {
      const container = document.getElementById('list-container');
      container.innerHTML = mocks.map(m => `
        <div class="mock-card ${editingId === m.id ? 'active' : ''}" onclick="editMock('${m.id}')">
          <span class="badge">${m.role.toUpperCase()}</span>
          <h3>${m.name}</h3>
          <p>${m.lat.toFixed(4)}, ${m.lng.toFixed(4)} • ${m.fillLevel}% Full</p>
          <div class="actions">
            <button class="btn btn-small btn-outline" onclick="deleteMock(event, '${m.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    let mapMarkers = [];
    function renderMarkers() {
      mapMarkers.forEach(m => m.remove());
      mapMarkers = [];

      mocks.forEach(m => {
        const el = document.createElement('div');
        el.innerHTML = m.role === 'point' ? '🗑️' : '🏠';
        el.style.fontSize = '20px';
        el.style.cursor = 'pointer';
        el.title = m.name;

        const marker = new mapboxgl.Marker({ element: el })
          .setLngLat([m.lng, m.lat])
          .addTo(map);
        
        marker.getElement().addEventListener('click', () => editMock(m.id));
        mapMarkers.push(marker);
      });
    }

    function editMock(id) {
      const mock = mocks.find(m => m.id === id);
      if (!mock) return;

      editingId = id;
      document.getElementById('editor-title').textContent = 'Editing Mock User';
      document.getElementById('mock-name').value = mock.name;
      document.getElementById('mock-role').value = mock.role;
      document.getElementById('mock-fill').value = mock.fillLevel;
      updateFormCoords(mock.lat, mock.lng);
      setTempMarker(mock.lat, mock.lng);
      document.getElementById('cancel-btn').style.display = 'block';
      
      map.flyTo({ center: [mock.lng, mock.lat], zoom: 16 });
      renderList();
    }

    document.getElementById('cancel-btn').onclick = () => {
      editingId = null;
      document.getElementById('editor-title').textContent = 'Add New Mock User';
      document.getElementById('mock-name').value = '';
      document.getElementById('mock-lat').value = '';
      document.getElementById('mock-lng').value = '';
      if (tempMarker) tempMarker.remove();
      document.getElementById('cancel-btn').style.display = 'none';
      renderList();
    };

    document.getElementById('save-btn').onclick = async () => {
      const data = {
        name: document.getElementById('mock-name').value,
        role: document.getElementById('mock-role').value,
        fillLevel: Number(document.getElementById('mock-fill').value),
        lat: Number(document.getElementById('mock-lat').value),
        lng: Number(document.getElementById('mock-lng').value),
        address: 'Added via Admin Dashboard'
      };

      if (!data.name || !data.lat || !data.lng) {
        showToast('Please provide name and location', 'red');
        return;
      }

      try {
        if (editingId) {
          await ApiModule.updateAdminMock(editingId, data);
          showToast('Updated successfully! ✅');
        } else {
          await ApiModule.createAdminMock(data);
          showToast('Added successfully! ✅');
        }
        
        editingId = null;
        document.getElementById('cancel-btn').click();
        loadMocks();
      } catch(e) {
        showToast('Server error during save', 'red');
      }
    };

    async function deleteMock(e, id) {
      e.stopPropagation();
      if (!confirm('Delete this mock user?')) return;
      try {
        await ApiModule.deleteAdminMock(id);
        showToast('Deleted! 🗑️');
        loadMocks();
      } catch(e) { showToast('Error deleting', 'red'); }
    }

    function showToast(msg, color = 'green') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.borderLeftColor = color === 'red' ? 'var(--red)' : 'var(--green)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    document.getElementById('test-notif-btn').onclick = async () => {
      document.getElementById('test-notif-btn').textContent = '🔔 Triggering...';
      try {
        if ('Notification' in window && Notification.permission !== 'denied') {
          await Notification.requestPermission();
          if (Notification.permission === 'granted') {
             new Notification('📢 Morning Pickup Alert', {
               body: 'This is a test notification for the house user.',
               icon: 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚛</text></svg>'
             });
          }
        }
        
        showToast('Push Notification Triggered! 🔔');
      } catch(e) { 
        showToast('Error triggering notification', 'red'); 
      }
      setTimeout(() => document.getElementById('test-notif-btn').textContent = '🔔 Trigger Push Notification', 1500);
    };

    window.onload = () => {
      console.log('✅ Window loaded, starting init');
      init().catch(err => {
        console.error('🔥 CRITICAL INIT ERROR:', err);
        showToast('Dashboard failed to initialize!', 'red');
      });
    };
  </script>
</body>
</html>
